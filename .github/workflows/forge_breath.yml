name: 🌬️ MusiChris Breath Forge

on:
  repository_dispatch:
    types: [forge_aliento]

jobs:
  render_video:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v3

      - name: 🎥 Install FFmpeg & Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-liberation
          # Localizar el path de la fuente para asegurar que FFmpeg la encuentre
          echo "FONT_PATH=/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf" >> $GITHUB_ENV

      - name: 🧠 AI Prophetic Generation (Triple Phase)
        env:
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
        run: |
          node << 'EOF'
          const https = require('https');
          const fs = require('fs');

          const profile = `${{ github.event.client_payload.profile }}`;
          const tone = `${{ github.event.client_payload.tone }}`;
          const context = `${{ github.event.client_payload.context }}`;
          const timestamp = new Date().toISOString(); // Semilla temporal para frescura total

          // Función para insertar saltos de línea y que el texto no se salga de la pantalla (aprox 15-20 caracteres por línea)
          const wrapText = (text, maxChars = 22) => {
            const words = text.split(' ');
            let lines = [];
            let currentLine = '';
            words.forEach(word => {
              if ((currentLine + word).length > maxChars) {
                lines.push(currentLine.trim());
                currentLine = word + ' ';
              } else {
                currentLine += word + ' ';
              }
            });
            lines.push(currentLine.trim());
            return lines.join('\n');
          };

          const payload = {
            model: 'gpt-oss-120b',
            messages: [
              {role: 'system', content: 'Eres el Motor de Sabiduría de MusiChris Studio. Genera revelaciones ministeriales con sustancia y profundidad. REGLAS: "screen_1": Apertura potente (máximo 15 palabras). "screen_2": Palabra de poder profunda (máximo 15 palabras). "description": Reflexión SEO breve. "seo_title": Título épico. "seo_tags": 10 tags. Mantén el equilibrio: esencia ministerial con máximo 15 palabras por pantalla.'},
              {role: 'user', content: `Perfil: ${profile}, Tono: ${tone}, Contexto: ${context}, Semilla: ${timestamp}`}
            ]
          };

          const options = {
            hostname: 'api.cerebras.ai',
            path: '/v1/chat/completions',
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + process.env.CEREBRAS_API_KEY
            }
          };

          const req = https.request(options, (res) => {
            let data = '';
            res.on('data', (chunk) => data += chunk);
            res.on('end', () => {
              if (res.statusCode !== 200) {
                console.error('❌ API Error:', data);
                // Intento de listar modelos disponibles para depuración
                console.log('--- Intentando listar modelos disponibles para depuración ---');
                https.get({
                  hostname: 'api.cerebras.ai',
                  path: '/v1/models',
                  headers: { 'Authorization': 'Bearer ' + process.env.CEREBRAS_API_KEY }
                }, (resMod) => {
                  let modData = '';
                  resMod.on('data', (c) => modData += c);
                  resMod.on('end', () => {
                    try {
                      const mods = JSON.parse(modData);
                      console.log('Modelos disponibles:', mods.data.map(m => m.id).join(', '));
                    } catch(e) { console.log('No se pudo listar modelos:', modData); }
                    process.exit(1);
                  });
                });
                return;
              }
              try {
                const response = JSON.parse(data);
                const content = JSON.parse(response.choices[0].message.content);
                
                // Procesar y envolver texto para visualización vertical
                const s1 = wrapText(content.screen_1.replace(/['":]/g, "").toUpperCase());
                const s2 = wrapText(content.screen_2.replace(/['":]/g, "").toUpperCase());
                
                fs.writeFileSync('s1.txt', s1);
                fs.writeFileSync('s2.txt', s2);
                
                // Export metadata to GITHUB_ENV
                fs.appendFileSync(process.env.GITHUB_ENV, `VIDEO_TITLE=${content.seo_title} #shorts\n`);
                fs.appendFileSync(process.env.GITHUB_ENV, `VIDEO_TAGS=${content.seo_tags}\n`);
                fs.appendFileSync(process.env.GITHUB_ENV, `DESC_TEXT<<VAR_EOF\n${content.description}\nVAR_EOF\n`);
                
                console.log('✅ Narrativa y SEO generados correctamente.');
              } catch (e) {
                console.error('Parse Error:', e);
                process.exit(1);
              }
            });
          });

          req.on('error', (e) => {
            console.error('Request Error:', e);
            process.exit(1);
          });

          req.write(JSON.stringify(payload));
          req.end();
          EOF

      - name: 🔨 Forging Ministerial Video
        run: |
          # Renderizado con Banda Cinematográfica de Legibilidad (0-15s)
          ffmpeg -stream_loop -1 -i assets/video/${{ github.event.client_payload.video }} \
                 -ss ${{ github.event.client_payload.start }} -t 25 -i assets/audio/${{ github.event.client_payload.audio }} \
                 -i assets/video/outro_animado.mp4 \
                 -filter_complex "[0:v]scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,setsar=1[bg]; \
                                   [bg]drawbox=y=(ih-700)/2-200:color=black@0.5:w=iw:h=700:t=fill:enable='between(t,0,15)'[bgbox]; \
                                   [bgbox]drawtext=textfile=s1.txt:fontfile='${{ env.FONT_PATH }}':fontcolor=white:fontsize=80:x=(w-text_w)/2:y=(h-text_h)/2-200:shadowcolor=black@0.9:shadowx=6:shadowy=6:enable='between(t,0,7)':line_spacing=35:fix_bounds=1[txt1]; \
                                   [txt1]drawtext=textfile=s2.txt:fontfile='${{ env.FONT_PATH }}':fontcolor=white:fontsize=80:x=(w-text_w)/2:y=(h-text_h)/2-200:shadowcolor=black@0.9:shadowx=6:shadowy=6:enable='between(t,7,15)':line_spacing=35:fix_bounds=1[txt2]; \
                                   [2:v]scale=850:-1,colorkey=0x000000:0.1:0.1,format=yuva420p[logo]; \
                                   [txt2][logo]overlay=(W-w)/2:(H-h)/2-250:enable='gt(t,15)'[v_logo]; \
                                   [v_logo]drawtext=text='@MusiChris_Studio':fontfile='${{ env.FONT_PATH }}':fontcolor=white:fontsize=65:x=(w-text_w)/2:y=(h-text_h)/2+200:shadowcolor=black@0.8:shadowx=4:shadowy=4:enable='gt(t,15)'[v_handle]; \
                                   [v_handle]drawtext=text='Caminemos juntos en fe':fontfile='${{ env.FONT_PATH }}':fontcolor=white:fontsize=48:x=(w-text_w)/2:y=(h-text_h)/2+300:shadowcolor=black@0.6:shadowx=2:shadowy=2:enable='gt(t,15)'[v]" \
                 -map "[v]" -map 1:a -shortest -c:v libx264 -preset fast -pix_fmt yuv420p output_final.mp4
          
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 📦 Install Dependencies
        run: npm install googleapis

      - name: ☁️ Upload to YouTube
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          VIDEO_TITLE: "${{ env.VIDEO_TITLE }}"
          VIDEO_TAGS: "${{ env.VIDEO_TAGS }}"
          VIDEO_DESCRIPTION: "🌬️ BREATH | Aliento Ministerial de MusiChris Studio\n\n🕊️ MENSAJE:\n${{ env.DESC_TEXT }}\n\n🎬 Sobre MusiChris Studio:\nCanal dedicado a la música y palabra que edifica tu alma. ¡Caminemos juntos en fe!\n\n💎 #MusiChris #Aliento #Fe #Reflexion #Shorts"
        run: |
          echo "📤 Subiendo a Musichris Studio..."
          node src/upload_engine.js output_final.mp4
