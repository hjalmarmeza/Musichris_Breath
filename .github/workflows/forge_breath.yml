name: 🌬️ MusiChris Breath Forge

on:
  repository_dispatch:
    types: [forge_aliento]

jobs:
  render_video:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v3

      - name: 🎥 Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: 🔨 Forging Ministerial Video
        env:
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
        run: |
          echo "🚀 Forjando Aliento para: ${{ github.event.client_payload.profile }}"
          echo "🎼 Usando Audio: assets/audio/${{ github.event.client_payload.audio }}"
          echo "📺 Usando Video: assets/video/${{ github.event.client_payload.video }}"
          
          # Renderizado Real con FFmpeg
          # 1. Generamos el script de voz o texto con Cerebras (Simulado por ahora)
          # 2. Unimos Fondo + Audio + Outro Animado
          ffmpeg -i assets/video/${{ github.event.client_payload.video }} \
                 -i assets/audio/${{ github.event.client_payload.audio }} \
                 -i assets/video/outro_animado.mp4 \
                 -filter_complex "[0:v][2:v]concat=n=2:v=1:a=0[v]" \
                 -map "[v]" -map 1:a -shortest output_final.mp4
          
      - name: ☁️ Upload to YouTube
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          echo "📤 Subiendo a Musichris Studio..."
          # Aquí llamamos al motor de subida que ya tienes configurado
          # node src/upload_engine.js output_final.mp4
