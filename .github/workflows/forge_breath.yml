name: 🌬️ MusiChris Breath Forge

on:
  repository_dispatch:
    types: [forge_aliento]

jobs:
  render_video:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v3

      - name: 🎥 Install FFmpeg & Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-liberation
          # Localizar el path de la fuente para asegurar que FFmpeg la encuentre
          echo "FONT_PATH=/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf" >> $GITHUB_ENV

      - name: 🧠 AI Prophetic Generation (Triple Phase)
        env:
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
        run: |
          node << 'EOF'
          const https = require('https');
          const fs = require('fs');

          const profile = `${{ github.event.client_payload.profile }}`;
          const tone = `${{ github.event.client_payload.tone }}`;
          const context = `${{ github.event.client_payload.context }}`;
          const timestamp = new Date().toISOString(); // Semilla temporal para frescura total

          // Función para insertar saltos de línea y que el texto no se salga de la pantalla (aprox 15-20 caracteres por línea)
          const wrapText = (text, maxChars = 32) => {
            const words = text.split(' ');
            let lines = [];
            let currentLine = '';
            words.forEach(word => {
              if ((currentLine + word).length > maxChars) {
                lines.push(currentLine.trim());
                currentLine = word + ' ';
              } else {
                currentLine += word + ' ';
              }
            });
            lines.push(currentLine.trim());
            return lines.join('\n');
          };

          const models = ['qwen-3-235b-a22b-instruct-2507', 'llama3.1-8b', 'zai-glm-4.7', 'gpt-oss-120b'];
          
          function cleanJSON(text) {
            try {
              const match = text.match(/\{[\s\S]*\}/);
              return match ? match[0] : text;
            } catch (e) { return text; }
          }

          const delay = ms => new Promise(resolve => setTimeout(resolve, ms));

          async function generateProphecy(modelIndex = 0) {
            if (modelIndex >= models.length) {
              console.error('❌ Todos los modelos fallaron.');
              process.exit(1);
            }

            const currentModel = models[modelIndex];
            console.log(`🧠 Intentando con modelo: ${currentModel}...`);

            const payload = {
              model: currentModel,
              messages: [
                {role: 'system', content: 'Eres el Motor de Sabiduría de MusiChris Studio. Genera revelaciones ministeriales PROFUNDAS de exactamente 15 palabras. REGLAS: Responde EXCLUSIVAMENTE con un JSON válido. "screen_1" y "screen_2": Cada una debe ser una frase de poder de 15 palabras + la cita bíblica que la sustenta (ej: — Filipenses 4:13). "description": Reflexión SEO. "seo_title": Título épico. "seo_tags": 10 tags.'},
                {role: 'user', content: `Perfil: ${profile}, Tono: ${tone}, Contexto: ${context}, Semilla: ${timestamp}`}
              ]
            };

            const options = {
              hostname: 'api.cerebras.ai',
              path: '/v1/chat/completions',
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + process.env.CEREBRAS_API_KEY
              }
            };

            const req = https.request(options, (res) => {
              let data = '';
              res.on('data', (chunk) => data += chunk);
              res.on('end', async () => {
                if (res.statusCode !== 200) {
                  console.warn(`⚠️ Fallo con ${currentModel}: ${res.statusCode}`);
                  await delay(3000);
                  generateProphecy(modelIndex + 1);
                  return;
                }
                try {
                  const response = JSON.parse(data);
                  const rawContent = response.choices[0].message.content;
                  const content = JSON.parse(cleanJSON(rawContent));
                  
                  const s1 = wrapText(content.screen_1.replace(/['":]/g, "").toUpperCase());
                  const s2 = wrapText(content.screen_2.replace(/['":]/g, "").toUpperCase());
                  
                  fs.writeFileSync('s1.txt', s1);
                  fs.writeFileSync('s2.txt', s2);
                  
                  fs.appendFileSync(process.env.GITHUB_ENV, `VIDEO_TITLE=${content.seo_title} #shorts\n`);
                  fs.appendFileSync(process.env.GITHUB_ENV, `VIDEO_TAGS=${content.seo_tags}\n`);
                  fs.appendFileSync(process.env.GITHUB_ENV, `DESC_TEXT<<VAR_EOF\n${content.description}\nVAR_EOF\n`);
                  
                  console.log(`✅ ÉXITO con ${currentModel}.`);
                } catch (e) {
                  console.warn(`⚠️ Error de parseo con ${currentModel}. Reintentando...`);
                  await delay(2000);
                  generateProphecy(modelIndex + 1);
                }
              });
            });

            req.on('error', async (e) => {
              console.warn(`⚠️ Error de red con ${currentModel}.`);
              await delay(2000);
              generateProphecy(modelIndex + 1);
            });

            req.write(JSON.stringify(payload));
            req.end();
          }

          generateProphecy();
          EOF

      - name: 🔨 Forging Ministerial Video
        run: |
          # Renderizado con Banda Cinematográfica de Legibilidad (0-15s)
          ffmpeg -t 25 -stream_loop -1 -i assets/video/${{ github.event.client_payload.video }} \
                 -ss ${{ github.event.client_payload.start }} -t 25 -i assets/audio/${{ github.event.client_payload.audio }} \
                 -i assets/images/logo_breath.png -filter_complex \
                 "[2:v]scale=220:220[logo]; \
                  [0:v]scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920[bg]; \
                  [bg]drawbox=x=100:y=(ih-800)/2:w=iw-200:h=800:color=black@0.6:t=fill:enable='between(t,0,15)'[bgbox]; \
                  [bgbox]drawtext=textfile=s1.txt:fontfile='${{ env.FONT_PATH }}':fontcolor=white:fontsize=60:x=(w-text_w)/2:y=(h-text_h)/2:shadowcolor=black@0.9:shadowx=6:shadowy=6:enable='between(t,0,7)':line_spacing=35:fix_bounds=1[txt1]; \
                  [txt1]drawtext=textfile=s2.txt:fontfile='${{ env.FONT_PATH }}':fontcolor=white:fontsize=60:x=(w-text_w)/2:y=(h-text_h)/2:shadowcolor=black@0.9:shadowx=6:shadowy=6:enable='between(t,7,15)':line_spacing=35:fix_bounds=1[txt2]; \
                  [txt2][logo]overlay=x=(W-w)/2:y=(H-h)/2-150:enable='between(t,20,25)'[bglogo]; \
                  [bglogo]drawtext=text='@Musichris_Studio':fontfile='${{ env.FONT_PATH }}':fontcolor=white:fontsize=50:x=(w-text_w)/2:y=(h/2)+100:enable='between(t,20,25)':shadowcolor=black@0.8:shadowx=4:shadowy=4[outro1]; \
                  [outro1]drawtext=text='Caminemos juntos en fe':fontfile='${{ env.FONT_PATH }}':fontcolor=white:fontsize=35:x=(w-text_w)/2:y=(h/2)+180:enable='between(t,20,25)':shadowcolor=black@0.8:shadowx=3:shadowy=3[v]" \
                 -map "[v]" -map 1:a -c:v libx264 -preset fast -pix_fmt yuv420p -t 25 -y output_final.mp4
          
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 📦 Install Dependencies
        run: npm install googleapis

      - name: ☁️ Upload to YouTube
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          VIDEO_TITLE: "${{ env.VIDEO_TITLE }}"
          VIDEO_TAGS: "${{ env.VIDEO_TAGS }}"
          VIDEO_DESCRIPTION: "🌬️ BREATH | Aliento Ministerial de MusiChris Studio\n\n🕊️ MENSAJE:\n${{ env.DESC_TEXT }}\n\n🎬 Sobre MusiChris Studio:\nCanal dedicado a la música y palabra que edifica tu alma. ¡Caminemos juntos en fe!\n\n💎 #MusiChris #Aliento #Fe #Reflexion #Shorts"
        run: |
          echo "📤 Subiendo a Musichris Studio..."
          node src/upload_engine.js output_final.mp4
