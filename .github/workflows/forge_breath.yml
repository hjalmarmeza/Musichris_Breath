name: 🌬️ MusiChris Breath Forge

on:
  repository_dispatch:
    types: [forge_aliento]

jobs:
  render_video:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v3

      - name: 🎥 Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: 🧠 AI Prophetic Message Generation
        env:
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
        run: |
          echo "🤖 Generando Palabra de Aliento con IA..."
          MESSAGE=$(curl -s https://api.cerebras.ai/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $CEREBRAS_API_KEY" \
            -d '{
              "model": "llama3.1-70b",
              "messages": [
                {"role": "system", "content": "Eres el Motor de Sabiduría de MusiChris Breath. Genera un mensaje de aliento CRISTIANO corto (máximo 40 palabras) para un video de YouTube. Enfoque: Soplo de vida, paz y fortaleza. NUNCA menciones la canción o promoción. Solo Palabra de Dios y aliento."},
                {"role": "user", "content": "Genera mensaje para Perfil: ${{ github.event.client_payload.profile }}, Tono: ${{ github.event.client_payload.tone }}, Contexto: ${{ github.event.client_payload.context }}"}
              ]
            }' | jq -r '.choices[0].message.content')
          echo "PROPHETIC_MESSAGE=$MESSAGE" >> $GITHUB_ENV

      - name: 🔨 Forging Ministerial Video
        run: |
          # Renderizado Ministerial Premium (Texto IA + Widget Premium)
          ffmpeg -stream_loop -1 -i assets/video/${{ github.event.client_payload.video }} \
                 -ss ${{ github.event.client_payload.start }} -t 25 -i assets/audio/${{ github.event.client_payload.audio }} \
                 -i assets/video/outro_animado.mp4 \
                 -filter_complex "[0:v]scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,setsar=1[bg]; \
                                  [bg]drawtext=text='${{ env.PROPHETIC_MESSAGE }}':fontcolor=white:fontsize=70:x=(w-text_w)/2:y=(h-text_h)/2-100:shadowcolor=black:shadowx=4:shadowy=4:enable='between(t,0,15)':line_spacing=20[txt]; \
                                  [2:v]scale=800:-1,colorkey=0x000000:0.1:0.1,format=yuva420p[logo]; \
                                  [txt][logo]overlay=(W-w)/2:(H-h)/2-100:enable='gt(t,15)'[v_logo]; \
                                  [v_logo]drawbox=y=h-350:color=black@0.5:width=800:height=120:t=fill:x=(w-800)/2:enable='gt(t,15)'[v_box]; \
                                  [v_box]drawtext=text='@MusiChris_Studio':fontcolor=white:fontsize=50:x=(w-text_w)/2:y=h-320:shadowcolor=black:shadowx=2:shadowy=2:enable='gt(t,15)'[v_f1]; \
                                  [v_f1]drawtext=text='Caminemos juntos en fe':fontcolor=white:fontsize=35:x=(w-text_w)/2:y=h-260:fontstyle=bold:enable='gt(t,15)'[v]" \
                 -map "[v]" -map 1:a -shortest -c:v libx264 -preset fast -pix_fmt yuv420p output_final.mp4
          
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 📦 Install Dependencies
        run: npm install googleapis

      - name: ☁️ Upload to YouTube
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          VIDEO_TITLE: "Mensaje de Aliento - MusiChris Breath"
          VIDEO_DESCRIPTION: "🌬️ ${{ github.event.client_payload.message }}\n\nForjado por MusiChris Breath Engine."
        run: |
          echo "📤 Subiendo a Musichris Studio..."
          node src/upload_engine.js output_final.mp4
